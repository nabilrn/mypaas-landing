<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" fill="white"/>

  <defs>
    <style>
      :root { --primary: #047857; }
      .trace {
        stroke: var(--primary);
        stroke-width: 1.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: .25;
      }
      .trace-strong {
        stroke: var(--primary);
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: .35;
      }
      .node {
        fill: white;
        stroke: var(--primary);
        stroke-width: 1.5;
        opacity: .30;
      }
      .node-fill {
        fill: var(--primary);
        opacity: .25;
      }
      .node-accent {
        fill: var(--primary);
        opacity: .38;
      }
      .dot {
        fill: var(--primary);
        opacity: .30;
      }
    </style>
  </defs>

  <!--
    Layout: 4-way symmetric around center (800, 450).
    All diagonal bends are exactly 30×30px.
    Clearing zone: ~x:490–1110, ~y:315–585
  -->

  <!-- ======== TOP-LEFT horizontal traces ======== -->
  <path class="trace"        d="M0 80H160L190 110H340L370 140H480"/>
  <path class="trace"        d="M0 145H130L160 175H310L340 205H450"/>
  <path class="trace-strong" d="M0 210H175L205 240H365L395 270H490"/>
  <path class="trace"        d="M0 285H145L175 315H310"/>

  <!-- ======== TOP-RIGHT horizontal traces (mirror x: x'=1600−x) ======== -->
  <path class="trace"        d="M1600 80H1440L1410 110H1260L1230 140H1120"/>
  <path class="trace"        d="M1600 145H1470L1440 175H1290L1260 205H1150"/>
  <path class="trace-strong" d="M1600 210H1425L1395 240H1235L1205 270H1110"/>
  <path class="trace"        d="M1600 285H1455L1425 315H1290"/>

  <!-- ======== BOTTOM-LEFT horizontal traces (mirror y: y'=900−y) ======== -->
  <path class="trace"        d="M0 820H160L190 790H340L370 760H480"/>
  <path class="trace"        d="M0 755H130L160 725H310L340 695H450"/>
  <path class="trace-strong" d="M0 690H175L205 660H365L395 630H490"/>
  <path class="trace"        d="M0 615H145L175 585H310"/>

  <!-- ======== BOTTOM-RIGHT horizontal traces (mirror x+y) ======== -->
  <path class="trace"        d="M1600 820H1440L1410 790H1260L1230 760H1120"/>
  <path class="trace"        d="M1600 755H1470L1440 725H1290L1260 695H1150"/>
  <path class="trace-strong" d="M1600 690H1425L1395 660H1235L1205 630H1110"/>
  <path class="trace"        d="M1600 615H1455L1425 585H1290"/>

  <!-- ======== TOP-LEFT vertical traces (from top edge) ======== -->
  <path class="trace" d="M130 0V55H245V125"/>
  <path class="trace" d="M305 0V40H410L440 70H525"/>
  <path class="trace" d="M465 0V30H525"/>

  <!-- ======== TOP-RIGHT vertical traces ======== -->
  <path class="trace" d="M1470 0V55H1355V125"/>
  <path class="trace" d="M1295 0V40H1190L1160 70H1075"/>
  <path class="trace" d="M1135 0V30H1075"/>

  <!-- ======== BOTTOM-LEFT vertical traces (from bottom edge) ======== -->
  <path class="trace" d="M130 900V845H245V775"/>
  <path class="trace" d="M305 900V860H410L440 830H525"/>
  <path class="trace" d="M465 900V870H525"/>

  <!-- ======== BOTTOM-RIGHT vertical traces ======== -->
  <path class="trace" d="M1470 900V845H1355V775"/>
  <path class="trace" d="M1295 900V860H1190L1160 830H1075"/>
  <path class="trace" d="M1135 900V870H1075"/>

  <!-- ======== LEFT edge (mid-height) ======== -->
  <path class="trace" d="M0 390H105L135 360H240"/>
  <path class="trace" d="M0 450H85L115 480H200"/>
  <path class="trace" d="M0 510H105L135 540H240"/>

  <!-- ======== RIGHT edge (mid-height, mirror x) ======== -->
  <path class="trace" d="M1600 390H1495L1465 360H1360"/>
  <path class="trace" d="M1600 450H1515L1485 480H1400"/>
  <path class="trace" d="M1600 510H1495L1465 540H1360"/>

  <!-- ======== NODES at key bends ======== -->
  <!-- top-left -->
  <circle class="node" cx="190" cy="110" r="6"/>
  <circle class="node" cx="370" cy="140" r="6"/>
  <circle class="node" cx="340" cy="205" r="6"/>
  <circle class="node" cx="205" cy="240" r="6"/>
  <circle class="node" cx="175" cy="315" r="6"/>
  <circle class="node" cx="440" cy="70" r="6"/>

  <!-- top-right (mirror x) -->
  <circle class="node" cx="1410" cy="110" r="6"/>
  <circle class="node" cx="1230" cy="140" r="6"/>
  <circle class="node" cx="1260" cy="205" r="6"/>
  <circle class="node" cx="1395" cy="240" r="6"/>
  <circle class="node" cx="1425" cy="315" r="6"/>
  <circle class="node" cx="1160" cy="70" r="6"/>

  <!-- bottom-left (mirror y) -->
  <circle class="node" cx="190" cy="790" r="6"/>
  <circle class="node" cx="370" cy="760" r="6"/>
  <circle class="node" cx="340" cy="695" r="6"/>
  <circle class="node" cx="205" cy="660" r="6"/>
  <circle class="node" cx="175" cy="585" r="6"/>
  <circle class="node" cx="440" cy="830" r="6"/>

  <!-- bottom-right (mirror x+y) -->
  <circle class="node" cx="1410" cy="790" r="6"/>
  <circle class="node" cx="1230" cy="760" r="6"/>
  <circle class="node" cx="1260" cy="695" r="6"/>
  <circle class="node" cx="1395" cy="660" r="6"/>
  <circle class="node" cx="1425" cy="585" r="6"/>
  <circle class="node" cx="1160" cy="830" r="6"/>

  <!-- left edge -->
  <circle class="node" cx="135" cy="360" r="6"/>
  <circle class="node" cx="135" cy="540" r="6"/>

  <!-- right edge (mirror x) -->
  <circle class="node" cx="1465" cy="360" r="6"/>
  <circle class="node" cx="1465" cy="540" r="6"/>

  <!-- ======== Accent nodes (symmetric set) ======== -->
  <circle class="node-accent" cx="205" cy="240" r="4"/>
  <circle class="node-accent" cx="1395" cy="240" r="4"/>
  <circle class="node-accent" cx="205" cy="660" r="4"/>
  <circle class="node-accent" cx="1395" cy="660" r="4"/>
  <circle class="node-accent" cx="340" cy="205" r="4"/>
  <circle class="node-accent" cx="1260" cy="205" r="4"/>
  <circle class="node-accent" cx="340" cy="695" r="4"/>
  <circle class="node-accent" cx="1260" cy="695" r="4"/>

  <!-- ======== Filled nodes (symmetric set) ======== -->
  <circle class="node-fill" cx="440" cy="70" r="4"/>
  <circle class="node-fill" cx="1160" cy="70" r="4"/>
  <circle class="node-fill" cx="440" cy="830" r="4"/>
  <circle class="node-fill" cx="1160" cy="830" r="4"/>

  <!-- ======== Dot grids (4×3, one per corner, symmetric) ======== -->
  <g opacity=".32">
    <g transform="translate(42 45)">
      <circle class="dot" cx="0" cy="0" r="1.4"/><circle class="dot" cx="18" cy="0" r="1.4"/><circle class="dot" cx="36" cy="0" r="1.4"/><circle class="dot" cx="54" cy="0" r="1.4"/>
      <circle class="dot" cx="0" cy="18" r="1.4"/><circle class="dot" cx="18" cy="18" r="1.4"/><circle class="dot" cx="36" cy="18" r="1.4"/><circle class="dot" cx="54" cy="18" r="1.4"/>
      <circle class="dot" cx="0" cy="36" r="1.4"/><circle class="dot" cx="18" cy="36" r="1.4"/><circle class="dot" cx="36" cy="36" r="1.4"/><circle class="dot" cx="54" cy="36" r="1.4"/>
    </g>
    <g transform="translate(1504 45)">
      <circle class="dot" cx="0" cy="0" r="1.4"/><circle class="dot" cx="18" cy="0" r="1.4"/><circle class="dot" cx="36" cy="0" r="1.4"/><circle class="dot" cx="54" cy="0" r="1.4"/>
      <circle class="dot" cx="0" cy="18" r="1.4"/><circle class="dot" cx="18" cy="18" r="1.4"/><circle class="dot" cx="36" cy="18" r="1.4"/><circle class="dot" cx="54" cy="18" r="1.4"/>
      <circle class="dot" cx="0" cy="36" r="1.4"/><circle class="dot" cx="18" cy="36" r="1.4"/><circle class="dot" cx="36" cy="36" r="1.4"/><circle class="dot" cx="54" cy="36" r="1.4"/>
    </g>
    <g transform="translate(42 819)">
      <circle class="dot" cx="0" cy="0" r="1.4"/><circle class="dot" cx="18" cy="0" r="1.4"/><circle class="dot" cx="36" cy="0" r="1.4"/><circle class="dot" cx="54" cy="0" r="1.4"/>
      <circle class="dot" cx="0" cy="18" r="1.4"/><circle class="dot" cx="18" cy="18" r="1.4"/><circle class="dot" cx="36" cy="18" r="1.4"/><circle class="dot" cx="54" cy="18" r="1.4"/>
      <circle class="dot" cx="0" cy="36" r="1.4"/><circle class="dot" cx="18" cy="36" r="1.4"/><circle class="dot" cx="36" cy="36" r="1.4"/><circle class="dot" cx="54" cy="36" r="1.4"/>
    </g>
    <g transform="translate(1504 819)">
      <circle class="dot" cx="0" cy="0" r="1.4"/><circle class="dot" cx="18" cy="0" r="1.4"/><circle class="dot" cx="36" cy="0" r="1.4"/><circle class="dot" cx="54" cy="0" r="1.4"/>
      <circle class="dot" cx="0" cy="18" r="1.4"/><circle class="dot" cx="18" cy="18" r="1.4"/><circle class="dot" cx="36" cy="18" r="1.4"/><circle class="dot" cx="54" cy="18" r="1.4"/>
      <circle class="dot" cx="0" cy="36" r="1.4"/><circle class="dot" cx="18" cy="36" r="1.4"/><circle class="dot" cx="36" cy="36" r="1.4"/><circle class="dot" cx="54" cy="36" r="1.4"/>
    </g>
  </g>
</svg>
